# Cohort 框架配置文件
# 优先级: 环境变量 > 此文件 > 代码默认值
#
# 环境变量覆盖:
#   COHORT_LLM_PROVIDER / COHORT_LLM_MODEL / COHORT_LLM_API_KEY / COHORT_LLM_BASE_URL
#   DEEPSEEK_API_KEY / DEEPSEEK_MODEL / DEEPSEEK_API_URL (兼容旧变量)

# ==========================================
# 第 1 层: 全局默认 LLM 配置（兜底）
# ==========================================
llm:
  provider: deepseek
  model: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}   # ★ 从环境变量读取，不写死
  # base_url: https://api.deepseek.com   # 空 = 用 Provider 默认值
  temperature: 0.3
  max_tokens: 4096
  timeout_seconds: 120
  max_retries: 3

# ==========================================
# 第 2 层: 按 Role 覆盖（Agent 级别）
# 只填想覆盖的字段，其余继承全局默认
# ==========================================
roles:
  # Alice (PM) — 用 DeepSeek 写 PRD
  Alice:
    temperature: 0.5     # PM 需要更多创造性

  # Bob (Architect) — 用 DeepSeek 做技术设计
  # 不填 = 完全继承全局配置

  # Charlie (Engineer) — 用 DeepSeek 写代码
  Charlie:
    temperature: 0.1     # 代码需要精确
    max_tokens: 3072     # 代码通常更长

# ==========================================
# 第 3 层: 按 Action 覆盖（最高优先级）
# ==========================================
actions:
  # 示例: 如果有 Anthropic API Key，可以让代码审查用 Claude
  # WriteCodeReview:
  #   provider: anthropic
  #   model: claude-haiku-4-5
  #   api_key: ${ANTHROPIC_API_KEY}

# ==========================================
# Agent 运行参数
# ==========================================
agent:
  max_react_loop: 10
  max_budget_usd: 5.0
  memory_max_size: 100

# ==========================================
# 工作区配置
# ==========================================
workspace:
  path: ./workspace
